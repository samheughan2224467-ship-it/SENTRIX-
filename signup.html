<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTRIX - Sign Up</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#081425;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:400px;
background:#112743;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:10px;
}

p{
text-align:center;
margin-bottom:25px;
color:#ddd;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#d4af37;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#f1c84b;
}

.login{
text-align:center;
margin-top:20px;
}

.login a{
color:#d4af37;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<p>Join SENTRIX and protect your digital life.</p>

<form>

<input
type="text"
placeholder="Full Name"
required>

<input
type="email"
placeholder="Email Address"
required>

<input
type="password"
placeholder="Password"
required>

<input
type="password"
placeholder="Confirm Password"
required>

<button type="button" onclick="signup()">

Create Account

</button>

</form>

<div class="login">

Already have an account?

<a href="login.html">

Log In

</a>

</div>

</div>

<script>

function signup(){

alert("Congratulations! Your SENTRIX account will be available once the secure backend is connected.");

}

</script>

</body>
</html>
