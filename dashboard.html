<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTRIX Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#08152c;
    color:white;
}

header{
    background:#0d1d3a;
    padding:20px;
    text-align:center;
    border-bottom:3px solid gold;
}

.container{
    padding:30px;
}

.card{
    background:#12284d;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

button{
    background:gold;
    color:#08152c;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
}
</style>
</head>

<body>

<header>
<h1>SENTRIX Dashboard</h1>
</header>

<div class="container">

<div class="card">
<h2>Welcome!</h2>
<p>You have successfully logged into SENTRIX.</p>
<p>Logged in as: <strong id="user-email">Loading...</strong></p>
</div>

<div class="card">
<h3>Security Status</h3>
<p>🟢 Your account is secure.</p>
</div>

<div class="card">
<h3>🛡 Scam Detector</h3>

<p>Paste a suspicious message below:</p>

<textarea
id="scam-text"
rows="6"
placeholder="Paste an email, SMS or WhatsApp message here..."></textarea>

<button onclick="scanMessage()">Analyze Message</button>

<p id="scan-result" style="margin-top:20px;font-weight:bold;"></p>

</div>

<button onclick="logout()">Log Out</button>

</div>

<script type="module">
import { auth } from "./firebase.js";
import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("user-email").textContent = user.email;
  } else {
    window.location.href = "login.html";
  }
});

window.logout = async function () {
  await signOut(auth);
  window.location.href = "login.html";
};

window.scanMessage = function () {

    const text = document.getElementById("scam-text").value.toLowerCase();

    let score = 0;

    const keywords = [
        "urgent",
        "verify",
        "bank",
        "click here",
        "winner",
        "lottery",
        "gift card",
        "password",
        "bitcoin",
        "crypto",
        "account suspended",
        "limited time",
        "claim now",
        "otp",
        "pin"
    ];

    keywords.forEach(word => {
        if (text.includes(word)) {
            score++;
        }
    });

    const result = document.getElementById("scan-result");

    if (score >= 5) {
        result.innerHTML = "🔴 HIGH RISK: This message looks like a scam.";
    } else if (score >= 2) {
        result.innerHTML = "🟡 WARNING: This message contains suspicious content.";
    } else {
        result.innerHTML = "🟢 LOW RISK: No obvious scam keywords detected.";
    }
};
</script>

</body>
</html>
