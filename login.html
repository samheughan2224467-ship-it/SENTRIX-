<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTRIX - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#081425;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:400px;
background:#112743;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

h1{
text-align:center;
color:#d4af37;
margin-bottom:10px;
}

p{
text-align:center;
margin-bottom:25px;
color:#ddd;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#d4af37;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#f1c84b;
}

.signup{
text-align:center;
margin-top:20px;
}

.signup a{
color:#d4af37;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h1>Log In</h1>

<p>Welcome back to SENTRIX.</p>

<input
id="email"
type="email"
placeholder="Email Address"
required>

<input
id="password"
type="password"
placeholder="Password"
required>

<button type="button" onclick="login()">
Log In
</button>

<div class="signup">
Don't have an account?
<a href="signup.html">Create Account</a>
</div>

</div>

<script type="module" src="firebase.js"></script>
<script src="login.js"></script>

</body>
</html>
